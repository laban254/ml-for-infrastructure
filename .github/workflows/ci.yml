name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  smoke-test:
    name: Execute core notebooks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install core dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nbconvert ruff

      - name: Lint helper scripts with Ruff
        run: ruff check fetch_data.py notebook_toggle.py

      - name: Smoke-test core notebooks
        run: |
          # Execute every notebook the lightweight core stack supports, top to
          # bottom, failing the build if any cell raises. The deep-learning /
          # MLOps notebooks need requirements-deep.txt (torch, tensorflow,
          # pyspark, mlflow, GPU) and are intentionally excluded here.
          find . -name "*.ipynb" \
            -not -path "*/.ipynb_checkpoints/*" \
            -not -path "*/.venv/*" \
            -not -path "./04_deep_learning/*" \
            -not -path "./05_sre_applications/llm_finetuning/*" \
            -not -path "./05_sre_applications/mlops_tracking/*" \
            -not -path "./01_foundations/distributed_data/*" \
            -print0 \
          | xargs -0 -I {} jupyter nbconvert --to notebook --execute \
              --ExecutePreprocessor.timeout=300 --stdout {} > /dev/null
